<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RailGuard AI — {% block title %}{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg:       #080c14;
    --surface:  #0d1421;
    --card:     #111827;
    --border:   #1e2d45;
    --accent:   #00c2ff;
    --accent2:  #0066ff;
    --safe:     #00e676;
    --warn:     #ffab00;
    --danger:   #ff3d3d;
    --text:     #c8d8f0;
    --muted:    #4a6080;
    --font-hud: 'Rajdhani', sans-serif;
    --font-mono:'Share Tech Mono', monospace;
    --font-body:'Inter', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
  }

  /* ---- SIDEBAR ---- */
  .sidebar {
    width: 240px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 0;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
  }
  .sidebar-logo {
    padding: 0 24px 32px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo .logo-mark {
    font-family: var(--font-hud);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .sidebar-logo .logo-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 2px;
  }
  .nav-section {
    padding: 24px 0 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    padding-left: 24px;
    text-transform: uppercase;
  }
  .nav-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 24px;
    color: var(--muted);
    text-decoration: none;
    font-family: var(--font-hud);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    transition: all 0.2s;
    border-left: 3px solid transparent;
  }
  .nav-link:hover { color: var(--text); background: rgba(0,194,255,0.05); }
  .nav-link.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(0,194,255,0.08);
  }
  .nav-link svg { width: 18px; height: 18px; flex-shrink: 0; }
  .sidebar-bottom {
    margin-top: auto;
    padding: 24px;
    border-top: 1px solid var(--border);
  }
  .user-pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-hud);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .user-avatar {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .logout-btn {
    display: block;
    margin-top: 10px;
    text-align: center;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    text-decoration: none;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .logout-btn:hover { color: var(--danger); border-color: var(--danger); }

  /* ---- MAIN ---- */
  .main {
    margin-left: 240px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    padding: 20px 36px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky; top: 0; z-index: 50;
  }
  .page-title {
    font-family: var(--font-hud);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text);
  }
  .topbar-right {
    display: flex; align-items: center; gap: 16px;
  }
  .live-indicator {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--safe);
    letter-spacing: 1px;
  }
  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--safe);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.85); }
  }
  .content { padding: 36px; flex: 1; }

  /* ---- CARDS ---- */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }
  .card-title {
    font-family: var(--font-hud);
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ---- STATUS BADGE ---- */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 1px;
    font-weight: 700;
  }
  .badge.safe      { background: rgba(0,230,118,.15); color: var(--safe); border: 1px solid var(--safe); }
  .badge.warn      { background: rgba(255,171,0,.15);  color: var(--warn); border: 1px solid var(--warn); }
  .badge.danger    { background: rgba(255,61,61,.15);  color: var(--danger); border: 1px solid var(--danger); }
  .badge.muted     { background: rgba(74,96,128,.15);  color: var(--muted); border: 1px solid var(--muted); }

  /* ---- GRID UTILITIES ---- */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .mt-20 { margin-top: 20px; }
  .mt-32 { margin-top: 32px; }
</style>
{% block head %}{% endblock %}
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">RailGuard</div>
    <div class="logo-sub">AI · DROWSINESS SYSTEM</div>
  </div>

  <div class="nav-section">Monitor</div>
  <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Dashboard
  </a>
  <a href="/analytics" class="nav-link {% if request.path == '/analytics' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Analytics
  </a>

  <div class="nav-section">Records</div>
  <a href="/logs" class="nav-link {% if request.path == '/logs' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Event Logs
  </a>

  <div class="sidebar-bottom">
    <div class="user-pill">
      <div class="user-avatar">{{ session.get('user','?')[0].upper() }}</div>
      <span>{{ session.get('user','Driver') }}</span>
    </div>
    <a href="/logout" class="logout-btn">⏻ LOGOUT</a>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="page-title">{% block page_title %}{% endblock %}</div>
    <div class="topbar-right">
      <div class="live-indicator">
        <div class="live-dot"></div>
        LIVE
      </div>
    </div>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RailGuard AI — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:     #080c14;
    --card:   #0d1421;
    --border: #1e2d45;
    --accent: #00c2ff;
    --a2:     #0066ff;
    --safe:   #00e676;
    --text:   #c8d8f0;
    --muted:  #4a6080;
    --danger: #ff3d3d;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,194,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,194,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    opacity: 0.35;
  }
  .orb-1 { width:420px; height:420px; background:#0044cc; top:-100px; left:-100px; }
  .orb-2 { width:300px; height:300px; background:#00c2ff; bottom:-80px; right:-80px; opacity:0.2; }

  .login-wrap {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    padding: 20px;
    animation: fadeUp 0.6s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .brand {
    text-align: center;
    margin-bottom: 36px;
  }
  .brand-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--a2));
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 0 40px rgba(0,194,255,0.3);
  }
  .brand-icon svg { width:32px; height:32px; color:#fff; }
  .brand-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .brand-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    margin-top: 4px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 1px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,194,255,0.12);
  }
  .field input::placeholder { color: var(--muted); }

  .error-msg {
    background: rgba(255,61,61,0.12);
    border: 1px solid rgba(255,61,61,0.4);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--danger);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }

  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--a2));
    border: none;
    border-radius: 8px;
    padding: 14px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 4px 24px rgba(0,102,255,0.35);
    margin-top: 8px;
  }
  .btn-login:hover  { opacity: 0.9; }
  .btn-login:active { transform: scale(0.98); }

  .hint {
    margin-top: 24px;
    background: rgba(0,194,255,0.06);
    border: 1px solid rgba(0,194,255,0.15);
    border-radius: 8px;
    padding: 12px 16px;
  }
  .hint-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .hint-row {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
  }
  .hint-row span { color: var(--text); }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      </svg>
    </div>
    <div class="brand-title">RailGuard</div>
    <div class="brand-sub">AI · DROWSINESS DETECTION SYSTEM</div>
  </div>

  <div class="card">
    {% if error %}
    <div class="error-msg">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" autocomplete="off" required/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn-login">Access System</button>
    </form>
  </div>

  <div class="hint">
    <div class="hint-title">DEFAULT CREDENTIALS</div>
    <div class="hint-row">Admin → <span>admin</span> / <span>railguard123</span></div>
    <div class="hint-row">Driver → <span>driver</span> / <span>driver123</span></div>
  </div>
</div>
</body>
</html>
